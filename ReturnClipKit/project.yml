name: ReturnClipKit
options:
  bundleIdPrefix: com.returnclip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

targets:
  ReturnClipKit:
    type: application
    platform: iOS
    sources:
      - path: ReturnClipKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.returnclip.ReturnClipKit
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: ReturnClipKit/SupportingFiles/Info.plist
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
